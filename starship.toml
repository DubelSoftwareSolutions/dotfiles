add_newline = true

format = """
${custom.host}\
${custom.docker}\
$directory\
$git_branch\
${custom.ros2}\
$cmake\
$python\
$line_break\
$character"""

[directory]
style = "bold cyan"
format = '[$path]($style) '
truncate_to_repo = true

[git_branch]
symbol = "🌿 "
format = '[$symbol$branch]($style) '

[cmake]
symbol = "⚙️ "
format = '[$symbol]($style) '
detect_files = ["CMakeLists.txt", "CMakeCache.txt", "colcon.meta"]

[python]
symbol = "🐍 "
format = '[$symbol$virtualenv]($style) '
detect_extensions = []
detect_files = ["setup.py", "pyproject.toml", "requirements.txt", "setup.cfg"]
detect_folders = []

[gcloud]
disabled = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[custom.docker]
description = "Indicator for Raw Docker Containers"
when = 'test -f /.dockerenv'
format = '[🐳]($style) '
style = "bold blue"

[custom.host]
description = "Indicator for Host Machine"
when = 'test ! -f /.dockerenv'
format = '[🏠]($style) '
style = "bold brown"

[custom.ros2]
when = 'test -n "$COLCON_PREFIX_PATH"'
command = 'echo $ROS_DISTRO'
symbol = "🐢 "
format = '[$symbol$output]($style) '
style = "bold blue"
