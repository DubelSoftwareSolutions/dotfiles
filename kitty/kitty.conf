shell zsh

# Scrollback and hints
scrollback_pager nvim -c "set nonumber nolist showtabline=0 foldcolumn=0|autocmd TermOpen * startinsert" -c "autocmd TermClose * call cursor(max([0,INPUT_LINE_NUMBER-1])+CURSOR_LINE, CURSOR_COLUMN)" -c "terminal sed </dev/fd/63 -e 's/"$'\E'R".*//'"
map ctrl+shift+h show_scrollback
map ctrl+shift+p kitten hints --type path --program @
map ctrl+shift+t kitten hints --type regex --regex "(?m)^/[-a-zA-Z0-9_]+(/[a-zA-Z0-9_]+)*" --program @

# Layout and broadcast controls
map f11 launch --allow-remote-control kitty +kitten broadcast
map ctrl+shift+z toggle_layout stack

# Remote control and URL handling
allow_remote_control yes
listen_on unix:@mykitty
open_url_with nvim

# Neovim window navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# BEGIN_KITTY_THEME
# Gruvbox Material Dark Hard
include current-theme.conf
# END_KITTY_THEME
